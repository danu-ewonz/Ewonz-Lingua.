<!DOCTYPE html>
<html>
<head>
  <title>Hiragana - Ewonz Lingua</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🈶 Hiragana</h1>
  <p>Learn Japanese Sounds</p>

  <!-- CENTER GRID -->
  <div class="grid">

    <div class="hira-card">
      <div class="jp">あ</div>
      <div class="en">A</div>
    </div>

    <div class="hira-card">
      <div class="jp">い</div>
      <div class="en">I</div>
    </div>

    <div class="hira-card">
      <div class="jp">う</div>
      <div class="en">U</div>
    </div>

    <div class="hira-card">
      <div class="jp">え</div>
      <div class="en">E</div>
    </div>

    <div class="hira-card">
      <div class="jp">お</div>
      <div class="en">O</div>
    </div>

  </div>

</div>

</body>
</html>
