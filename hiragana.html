<!DOCTYPE html>
<html>
<head>
  <title>Hiragana - Ewonz Lingua</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🈶 Hiragana</h1>

  <!-- LETTER GRID -->
  <div class="grid">

    <div class="hira-card">あ</div>
    <div class="hira-card">い</div>
    <div class="hira-card">う</div>
    <div class="hira-card">え</div>
    <div class="hira-card">お</div>

  </div>

  <!-- BUTTON -->
  <button onclick="showStep()">Hiragana Step ➡️</button>

  <!-- STEP SECTION (hidden first) -->
  <div id="stepBox" style="display:none; margin-top:20px;">

    <h2>📖 Step Learning</h2>

    <div class="step-card">A - あ</div>
    <div class="step-card">I - い</div>
    <div class="step-card">U - う</div>
    <div class="step-card">E - え</div>
    <div class="step-card">O - お</div>

  </div>

</div>

<script>
function showStep() {
  document.getElementById("stepBox").style.display = "block";
}
</script>

</body>
</html>
